<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strandbutler SDK — Rügen App</title>
<style>
/* ============================================================
   TOKENS
   ============================================================ */
:root{
  /* Rügen host */
  --ru-orange:#EE7D00;
  --ru-orange-deep:#D86E00;
  --ru-ink:#1B1B1B;
  --ru-line:#C4C9D1;
  --ru-muted:#7C828C;
  --ru-bg:#FFFFFF;
  --ru-promo:#9A9DA1;

  /* Strandbutler SDK */
  --sb-navy:#15326E;
  --sb-navy-700:#102A5E;
  --sb-dark:#102650;       /* unlock / immersive bg */
  --sb-dark-2:#0C1E42;
  --sb-screen:#EEF1F6;     /* SDK light screen bg */
  --sb-sand:#F3E1B0;       /* chair selection bg */
  --sb-water:#BFE0EE;
  --sb-beach:#F2E3B6;
  --sb-green:#1FA463;
  --sb-green-bg:#E4F6EC;
  --sb-booked:#E2E6EE;
  --sb-booked-ink:#9AA3B5;
  --sb-ink:#16213A;
  --sb-muted:#6B7488;

  --shadow-card:0 1px 3px rgba(16,30,70,.10),0 6px 20px rgba(16,30,70,.08);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:#E7E3DC;
  background:radial-gradient(120% 90% at 50% 0%,#EFECE5 0%,#E2DDD4 100%);
  color:var(--ru-ink);
  -webkit-font-smoothing:antialiased;
}
.cond{font-family:"Helvetica Neue Condensed","Arial Narrow","Roboto Condensed",Arial,sans-serif;letter-spacing:.04em;}

/* ============================================================
   STAGE + DEVICE
   ============================================================ */
.stage{
  min-height:100%;
  max-width:1600px;
  margin:0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:16px 16px 20px;
}
.scaler{display:flex;align-items:center;justify-content:center;}
.device{
  position:relative;
  width:428px;height:874px;
  background:#000;border-radius:54px;
  padding:24px;
  box-shadow:0 0 0 2px #2a2a2c,0 30px 60px -18px rgba(20,30,55,.55),0 12px 24px rgba(0,0,0,.25);
  transform-origin:center center;
}
.screen{
  position:relative;width:100%;height:100%;
  background:var(--ru-bg);border-radius:42px;overflow:hidden;
  display:flex;flex-direction:column;
}
/* dynamic island */
.island{
  position:absolute;top:11px;left:50%;transform:translateX(-50%);
  width:120px;height:33px;background:#000;border-radius:20px;z-index:60;
}

/* status bar */
.statusbar{
  height:52px;flex:0 0 52px;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 28px 9px;font-size:15px;font-weight:600;color:#0c0c0c;
  position:relative;z-index:40;
}
.statusbar .sb-right{display:flex;align-items:center;gap:7px;}
.sig{display:flex;align-items:flex-end;gap:2px;height:11px;}
.sig i{width:3px;background:#0c0c0c;border-radius:1px;}
.sig i:nth-child(1){height:4px}.sig i:nth-child(2){height:6px}.sig i:nth-child(3){height:8px}.sig i:nth-child(4){height:11px}
.wifi{width:16px;height:12px;}
.batt{width:25px;height:12px;border:1px solid rgba(12,12,12,.55);border-radius:3px;position:relative;padding:1.5px;}
.batt::after{content:"";position:absolute;right:-3px;top:3.5px;width:2px;height:5px;background:rgba(12,12,12,.45);border-radius:0 1px 1px 0;}
.batt i{display:block;height:100%;width:65%;background:#0c0c0c;border-radius:1px;}
.screen.is-dark .statusbar{color:#fff;}
.screen.is-dark .sig i{background:#fff;}
.screen.is-dark .batt{border-color:rgba(255,255,255,.6);}
.screen.is-dark .batt::after{background:rgba(255,255,255,.5);}
.screen.is-dark .batt i{background:#fff;}

/* viewport scroll region */
.viewport{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;}
.viewport::-webkit-scrollbar{width:0;height:0;}

/* host bottom nav */
.tabbar{
  flex:0 0 auto;background:#fff;border-top:1px solid #ECECEC;
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  position:relative;z-index:40;
}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer;color:#A9AEB6;}
.tab .t-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;}
.tab .t-ic svg{width:24px;height:24px;stroke:currentColor;fill:none;}
.tab span{font-size:10.5px;font-weight:600;letter-spacing:.02em;}
.tab.active{color:var(--ru-orange);}
.tab .logo-r{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:8.5px;font-weight:800;letter-spacing:.02em;border:1.5px solid currentColor;
}
.tab .logo-z{
  width:26px;height:26px;border-radius:50%;background:#1c1c1c;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:6.5px;font-weight:800;line-height:1;text-align:center;
}

/* device home indicator */
.homebar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(0,0,0,.32);z-index:50;}
.screen.is-dark .homebar{background:rgba(255,255,255,.5);}

/* ============================================================
   RÜGEN HOST — HEADER + GRID
   ============================================================ */
.ru-header{
  display:flex;align-items:center;justify-content:center;position:relative;
  padding:10px 18px 12px;border-bottom:1px solid #EFEFEF;
}
.ru-header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:.16em;color:var(--ru-ink);}
.ru-header .h-act{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--ru-orange);cursor:pointer;display:flex;}
.ru-header .h-act svg{width:22px;height:22px;}
.ru-header .h-back{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ru-orange);font-weight:600;font-size:16px;display:flex;align-items:center;gap:2px;cursor:pointer;}
.ru-sub{text-align:center;color:var(--ru-orange);font-size:19px;font-weight:700;padding:13px 0 4px;}

.ru-promo{
  margin:0;background:var(--ru-promo);color:#fff;text-align:center;
  padding:26px 16px;position:relative;overflow:hidden;
}
.ru-promo .pk{font-size:11px;letter-spacing:.32em;font-weight:600;opacity:.9;}
.ru-promo .pt{font-family:"Snell Roundhand","Brush Script MT",cursive;font-size:34px;line-height:1;margin:6px 0 12px;font-weight:600;}
.ru-promo .pu{display:inline-block;border:1px solid rgba(255,255,255,.7);border-radius:4px;padding:6px 18px;font-size:11px;letter-spacing:.2em;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 14px;padding:18px 16px 22px;}
.tile{cursor:pointer;}
.tile .frame{
  position:relative;border:1px solid #2b2b2b;border-color:#3a3a3a;
  padding:9px;margin-top:9px;
}
.tile .label{
  position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  background:#fff;padding:0 8px;font-weight:800;font-size:12.5px;letter-spacing:.06em;
  white-space:nowrap;color:#1a1a1a;
}
.tile .photo{width:100%;height:96px;background-size:cover;background-position:center;display:block;}
.tile.tall .photo{height:210px;}
.tile.wide{grid-column:span 2;}
.tile.wide .photo{height:120px;}
.tile:active .frame{transform:scale(.99);}

/* the new SDK entry tile */
.tile.sb-tile .frame{border-color:var(--sb-navy);box-shadow:0 6px 18px -8px rgba(21,50,110,.5);}
.tile.sb-tile .label{color:var(--sb-navy);}
.sb-tile .photo{
  height:120px;position:relative;
  background:linear-gradient(180deg,#BFE3F1 0%,#CFE9F2 46%,#F0E2B4 46%,#F2E6BC 100%);
  display:flex;align-items:flex-end;justify-content:center;gap:10px;padding-bottom:14px;
}
.sb-badge{
  position:absolute;top:7px;right:7px;background:var(--sb-navy);color:#fff;
  font-size:8.5px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
}
.sb-badge .dot{width:5px;height:5px;border-radius:50%;background:#7FA8E8;}
.mini-chair{width:30px;height:34px;background:var(--sb-navy);border-radius:15px 15px 5px 5px;position:relative;box-shadow:0 3px 6px rgba(21,50,110,.35);}
.mini-chair::after{content:"";position:absolute;left:6px;right:6px;bottom:5px;height:3px;border-radius:2px;background:rgba(255,255,255,.5);}
.mini-chair.alt{background:#1d4287;}

/* ============================================================
   SDK SEAM
   ============================================================ */
.seam{
  flex:0 0 auto;background:var(--sb-navy);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;font-size:12.5px;position:relative;z-index:30;
}
.seam .brand{display:flex;align-items:center;gap:7px;font-weight:700;letter-spacing:.01em;}
.seam .brand .case{width:14px;height:13px;border:1.6px solid #fff;border-radius:2px;position:relative;}
.seam .brand .case::before{content:"";position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:6px;height:3px;border:1.6px solid #fff;border-bottom:0;border-radius:2px 2px 0 0;}
.seam .back{display:flex;align-items:center;gap:5px;color:#C7D6F2;font-weight:500;cursor:pointer;font-size:12px;}

/* SDK generic screen */
.sdk{display:flex;flex-direction:column;min-height:100%;background:var(--sb-screen);}
.sdk-head{
  flex:0 0 auto;background:#EEF1F6;display:flex;align-items:center;justify-content:center;position:relative;
  padding:14px 52px;border-bottom:1px solid #E2E6EF;
}
.sdk-head h2{margin:0;font-size:17px;font-weight:700;color:var(--sb-ink);}
.sdk-head .hb{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--sb-navy);cursor:pointer;}
.sdk-head .hb svg{width:22px;height:22px;}
.sdk-head .hr{position:absolute;right:14px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:var(--sb-navy);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sdk-head .hr.info{background:var(--ru-orange);}
.sdk-head .hr svg{width:18px;height:18px;}
.sdk-body{flex:1 1 auto;min-height:0;}

/* ---- Map discovery ---- */
.map-top{background:#EEF1F6;padding:0 16px 14px;}
.map-top .mt-row{display:flex;gap:10px;align-items:center;}
.date-field{
  flex:1;background:#fff;border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-card);font-size:14px;font-weight:600;color:var(--sb-ink);
}
.date-field svg{width:16px;height:16px;color:var(--ru-orange);}
.date-go{width:46px;height:46px;border-radius:50%;background:#fff;box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.date-go svg{width:20px;height:20px;color:var(--sb-navy);}
.map-canvas{
  position:relative;height:430px;overflow:hidden;
  background:linear-gradient(180deg,#AFD9EC 0%,#BFE2F0 100%);
}
.map-canvas .land{position:absolute;background:#EBDFAE;}
.map-canvas .seg{position:absolute;background:rgba(255,255,255,.45);}
.map-canvas .grn{position:absolute;background:#CFDFA8;border-radius:50%;opacity:.7;}
.map-canvas .lbl{position:absolute;font-size:11px;font-weight:600;color:#6f7a55;}
.wave{position:absolute;left:0;right:0;height:60px;opacity:.4;background:
  repeating-linear-gradient(0deg,transparent 0 12px,rgba(255,255,255,.5) 12px 13px);}
.pin{
  position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:5;
  filter:drop-shadow(0 4px 5px rgba(16,30,70,.35));
}
.pin .body{width:42px;height:42px;background:var(--sb-navy);border-radius:50% 50% 50% 4px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;}
.pin .body .ic{transform:rotate(-45deg);width:18px;height:20px;background:#fff;border-radius:9px 9px 3px 3px;position:relative;}
.pin .body .ic::after{content:"";position:absolute;left:3px;right:3px;bottom:3px;height:2px;border-radius:1px;background:var(--sb-navy);}
.pin .count{position:absolute;top:-9px;right:-12px;background:#fff;color:var(--sb-navy);font-size:11px;font-weight:800;padding:2px 7px;border-radius:11px;box-shadow:0 2px 5px rgba(16,30,70,.25);transform:rotate(0);}
.pin.sel .body{background:var(--ru-orange);}
.pin.sel .count{color:var(--ru-orange);}
.avail-card{
  position:absolute;left:14px;right:14px;bottom:14px;background:#fff;border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 24px rgba(16,30,70,.18);z-index:8;
}
.avail-card .av-l{display:flex;align-items:center;gap:11px;}
.av-chair{width:26px;height:30px;background:var(--sb-navy);border-radius:13px 13px 4px 4px;flex:0 0 auto;position:relative;}
.av-chair::after{content:"";position:absolute;left:4px;right:4px;bottom:4px;height:2.5px;border-radius:1px;background:rgba(255,255,255,.55);}
.avail-card .big{font-size:16px;font-weight:800;color:var(--sb-ink);}
.avail-card .sub{font-size:12px;color:var(--sb-muted);margin-top:1px;}

/* primary button */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--sb-navy);color:#fff;border:0;border-radius:13px;padding:15px;
  font-size:15.5px;font-weight:700;cursor:pointer;font-family:inherit;
}
.btn:active{background:var(--sb-navy-700);}
.btn.sm{width:auto;padding:11px 18px;border-radius:11px;font-size:14px;}
.btn.ghost{background:#fff;color:var(--sb-navy);border:1.5px solid var(--sb-navy);}
.btn.gray{background:#fff;color:var(--sb-muted);border:1px solid #DfE3EC;}
.btn svg{width:17px;height:17px;}

/* ---- Chair selection ---- */
.rows{background:var(--sb-sand);padding:18px 16px 16px;min-height:100%;}
.rows .rlabel{font-size:14px;font-weight:800;color:var(--sb-navy);margin:0 2px 9px;}
.rows .rgrp{margin-bottom:18px;}
.rgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;}
.chair{
  position:relative;aspect-ratio:5/6;border-radius:12px 12px 5px 5px;
  background:var(--sb-navy);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 6px rgba(16,30,70,.22);
}
.chair::after{content:"";position:absolute;left:18%;right:18%;bottom:5px;height:3px;border-radius:2px;background:rgba(255,255,255,.5);}
.chair .bt{position:absolute;top:4px;left:5px;width:8px;height:11px;}
.chair.booked{background:var(--sb-booked);color:var(--sb-booked-ink);box-shadow:none;cursor:not-allowed;}
.chair.booked::after{background:rgba(0,0,0,.08);}
.chair.sel{background:var(--ru-orange);box-shadow:0 0 0 3px rgba(238,125,0,.3),0 4px 8px rgba(238,125,0,.35);}
.legend{
  display:flex;align-items:center;justify-content:center;gap:18px;
  background:#fff;padding:13px;border-top:1px solid #E6E9F0;font-size:12px;color:var(--sb-muted);
}
.legend .lg{display:flex;align-items:center;gap:6px;}
.legend .sw{width:15px;height:16px;border-radius:5px 5px 2px 2px;}
.legend .sw.av{background:var(--sb-navy);}
.legend .sw.bk{background:var(--sb-booked);}
.select-bar{
  position:sticky;bottom:0;background:#fff;border-top:1px solid #E6E9F0;
  padding:12px 16px calc(12px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;
}
.select-bar .sinfo{flex:1;}
.select-bar .sinfo-t{font-size:14px;font-weight:800;color:var(--sb-ink);}
.select-bar .sinfo-s{font-size:11.5px;color:var(--sb-muted);}

/* ---- generic SDK content padding ---- */
.pad{padding:16px;}
.section-k{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--sb-muted);margin:4px 2px 9px;}

/* cart */
.cart-meta{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 12px;}
.cart-meta .ci{font-size:13px;color:var(--sb-muted);font-weight:600;}
.chip{background:#E4E9F3;color:var(--sb-navy);font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:20px;border:0;cursor:pointer;font-family:inherit;}
.card{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow-card);}
.card .c-top{display:flex;align-items:flex-start;justify-content:space-between;}
.card .c-title{font-size:18px;font-weight:800;color:var(--sb-navy);}
.card .c-tsub{font-size:13px;color:var(--sb-muted);margin-top:2px;}
.card .trash{color:var(--sb-muted);cursor:pointer;width:22px;height:22px;}
.divider{height:1px;background:#EEF0F5;margin:14px 0;}
.kv{display:flex;justify-content:space-between;gap:14px;margin-bottom:12px;}
.kv .k{font-size:12.5px;color:var(--sb-muted);font-weight:600;}
.kv .v{font-size:13.5px;color:var(--sb-ink);font-weight:700;text-align:right;}
.kv .v.price{color:var(--sb-navy);font-size:15px;}
.total{display:flex;align-items:center;justify-content:space-between;margin:18px 2px;}
.total .tl{font-size:15px;font-weight:600;color:var(--sb-ink);}
.total .tr{font-size:22px;font-weight:800;color:var(--sb-navy);}

/* payment */
.pay-opt{
  display:flex;align-items:center;gap:13px;background:#fff;padding:15px 14px;cursor:pointer;
  border-bottom:1px solid #EEF0F5;
}
.pay-list{background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow-card);}
.pay-list .pay-opt:last-child{border-bottom:0;}
.pay-ic{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-weight:800;font-size:15px;}
.pay-name{flex:1;font-size:15px;font-weight:700;color:var(--sb-ink);}
.radio{width:21px;height:21px;border-radius:50%;border:2px solid #C8CEDC;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
.pay-opt.on .radio{border-color:var(--sb-navy);}
.pay-opt.on .radio::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--sb-navy);}
.bill{background:#fff;border-radius:16px;box-shadow:var(--shadow-card);padding:4px 16px;}
.bill .bf{padding:12px 0;border-bottom:1px solid #EEF0F5;}
.bill .bf:last-child{border-bottom:0;}
.bill .bf .bl{font-size:11px;color:var(--sb-muted);}
.bill .bf .bv{font-size:15px;font-weight:700;color:var(--sb-ink);margin-top:2px;}

/* confirmation */
.confirm{text-align:center;padding:30px 18px 16px;}
.check{
  width:74px;height:74px;border-radius:50%;background:var(--sb-green);margin:6px auto 18px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(31,164,99,.35);
  animation:pop .45s cubic-bezier(.2,1.2,.4,1);
}
@keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
.check svg{width:38px;height:38px;color:#fff;}
.confirm h2{margin:0;font-size:22px;font-weight:800;color:var(--sb-ink);}
.confirm p{margin:7px 0 0;font-size:14px;color:var(--sb-muted);}
.active-pill{display:inline-flex;align-items:center;gap:7px;background:var(--sb-green-bg);color:#127c4a;font-size:12px;font-weight:700;padding:7px 13px;border-radius:20px;margin-top:14px;}
.active-pill .d{width:7px;height:7px;border-radius:50%;background:var(--sb-green);}

/* bookings */
.book-card{background:#fff;border-radius:16px;border:1.5px solid var(--sb-green);padding:15px;box-shadow:var(--shadow-card);}
.book-card.locked{border-color:#E2E6EF;}
.bk-top{display:flex;gap:13px;}
.bk-thumb{width:54px;height:54px;border-radius:12px;background:var(--sb-green-bg);position:relative;flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
.bk-thumb.lk{background:#EDF0F6;}
.bk-thumb .cc{width:26px;height:30px;border-radius:13px 13px 4px 4px;background:var(--sb-green);position:relative;}
.bk-thumb.lk .cc{background:var(--sb-navy);}
.bk-thumb .cc::after{content:"";position:absolute;left:4px;right:4px;bottom:4px;height:2.5px;border-radius:1px;background:rgba(255,255,255,.6);}
.bk-thumb .badge{position:absolute;bottom:-3px;right:-3px;width:19px;height:19px;border-radius:50%;background:var(--sb-green);border:2px solid #fff;display:flex;align-items:center;justify-content:center;}
.bk-thumb.lk .badge{background:var(--sb-navy);}
.bk-thumb .badge svg{width:10px;height:10px;color:#fff;}
.bk-info{flex:1;min-width:0;}
.bk-h{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.bk-title{font-size:16px;font-weight:800;color:var(--sb-ink);}
.bk-stat{font-size:10px;font-weight:800;letter-spacing:.04em;padding:4px 9px;border-radius:20px;}
.bk-stat.un{background:var(--sb-green-bg);color:#127c4a;}
.bk-stat.lk{background:#EDF0F6;color:var(--sb-muted);}
.bk-loc{font-size:13px;color:var(--sb-muted);margin-top:3px;}
.bk-meta{display:flex;align-items:center;gap:13px;margin-top:6px;font-size:12px;color:var(--sb-muted);font-weight:600;}
.bk-meta .m{display:flex;align-items:center;gap:4px;}
.bk-meta .m svg{width:13px;height:13px;}
.bk-meta .bt{color:#1b86d6;}
.bk-actions{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #EEF0F5;}
.bk-actions .btn.sm{flex:1;}
.bk-actions .btn.gray{flex:0 0 auto;}

/* empty bookings */
.empty{text-align:center;padding:60px 30px;}
.empty .ec{width:78px;height:78px;border-radius:50%;background:#E5E9F2;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;}
.empty .ec .cc{width:30px;height:34px;border-radius:15px 15px 5px 5px;background:var(--sb-navy);position:relative;}
.empty .ec .cc::after{content:"";position:absolute;left:5px;right:5px;bottom:4px;height:3px;border-radius:1px;background:rgba(255,255,255,.5);}
.empty h3{margin:0 0 6px;font-size:18px;font-weight:800;color:var(--sb-ink);}
.empty p{margin:0 0 22px;font-size:13.5px;color:var(--sb-muted);}

/* ---- unlock ---- */
.unlock{
  background:radial-gradient(120% 80% at 50% 38%,#1a3c7e 0%,var(--sb-dark) 55%,var(--sb-dark-2) 100%);
  min-height:100%;display:flex;flex-direction:column;align-items:center;color:#fff;
  padding:0 24px 24px;text-align:center;
}
.unlock .uhead{width:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:16px 0 6px;}
.unlock .uhead h2{margin:0;font-size:17px;font-weight:700;}
.unlock .uhead .ub{position:absolute;left:0;top:14px;color:#fff;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;}
.unlock .usub{font-size:13.5px;color:#AEC2E6;margin-top:34px;}
.bt-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;position:relative;min-height:300px;}
.bt-circle{
  width:150px;height:150px;border-radius:50%;border:2px solid rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);
  cursor:pointer;position:relative;z-index:3;transition:transform .2s;
}
.bt-circle:active{transform:scale(.96);}
.bt-circle svg{width:54px;height:60px;color:#fff;}
.ripple{position:absolute;border-radius:50%;border:2px solid rgba(140,175,235,.6);width:150px;height:150px;left:50%;top:50%;transform:translate(-50%,-50%);opacity:0;}
.unlock.connecting .ripple{animation:rip 1.6s ease-out infinite;}
.unlock.connecting .ripple.r2{animation-delay:.5s;}
.unlock.connecting .ripple.r3{animation-delay:1s;}
@keyframes rip{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(2.1);opacity:0}}
.unlock .ucta{font-size:20px;font-weight:800;margin-bottom:6px;}
.unlock .uhint{font-size:13px;color:#9DB2DA;text-decoration:underline;text-underline-offset:3px;margin-top:10px;cursor:pointer;padding-bottom:4px;}
.bt-circle.done{background:var(--sb-green);border-color:var(--sb-green);}
.unlock.connecting .bt-circle{border-color:rgba(140,175,235,.9);}

/* ---- QR import / scan ---- */
.scan{
  background:radial-gradient(120% 80% at 50% 40%,#1a3c7e 0%,var(--sb-dark) 55%,var(--sb-dark-2) 100%);
  min-height:100%;display:flex;flex-direction:column;align-items:center;color:#fff;padding:0 24px 22px;text-align:center;
}
.scan .uhead{width:100%;display:flex;align-items:center;justify-content:center;position:relative;padding:16px 0 6px;}
.scan .uhead h2{margin:0;font-size:17px;font-weight:700;}
.scan .uhead .ub{position:absolute;left:0;top:14px;color:#fff;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;}
.scan .usub{font-size:13.5px;color:#AEC2E6;margin-top:18px;}
.scan-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:260px;}
.qr-frame{
  position:relative;width:212px;height:212px;border-radius:22px;background:#fff;overflow:hidden;
  display:flex;align-items:center;justify-content:center;box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.qr-frame.ok{background:#fff;}
.qr-dots{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;width:150px;height:150px;}
.qr-dots span{background:transparent;border-radius:2px;}
.qr-dots span.on{background:#15326E;}
.corner{position:absolute;width:30px;height:30px;border:3px solid var(--sb-navy);}
.corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;border-radius:8px 0 0 0;}
.corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;border-radius:0 8px 0 0;}
.corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;border-radius:0 0 0 8px;}
.corner.br{bottom:14px;right:14px;border-left:0;border-top:0;border-radius:0 0 8px 0;}
.scanline{position:absolute;left:8px;right:8px;height:3px;border-radius:2px;background:linear-gradient(90deg,transparent,#EE7D00,transparent);box-shadow:0 0 10px 2px rgba(238,125,0,.6);top:10%;animation:scanmove 1.5s ease-in-out infinite;}
@keyframes scanmove{0%{top:10%}50%{top:86%}100%{top:10%}}
.qr-check{width:96px;height:96px;border-radius:50%;background:var(--sb-green);display:flex;align-items:center;justify-content:center;animation:pop .4s cubic-bezier(.2,1.2,.4,1);}
.qr-check svg{width:48px;height:48px;color:#fff;}
.scan-status{font-size:15px;font-weight:700;color:#fff;margin:4px 0 6px;}
.scan-result{margin:6px 0 18px;}
.scan-result .sr-t{font-size:18px;font-weight:800;color:#5BE39B;}
.scan-result .sr-s{font-size:13px;color:#AEC2E6;margin-top:5px;}

/* ============================================================
   SHOWCASE STRIP
   ============================================================ */
.showcase{
  display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);border-radius:20px;padding:3px;
  box-shadow:0 10px 30px -8px rgba(20,30,55,.35),0 0 0 1px rgba(255,255,255,.6) inset;
  width:auto;max-width:700px;overflow-x:auto;
}
.showcase::-webkit-scrollbar{display:none;}
.sc-step{
  display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:16px;cursor:pointer;
  white-space:nowrap;color:#5B6477;font-size:10.5px;font-weight:600;flex:0 0 auto;transition:.15s;
}
.sc-step .n{width:16px;height:16px;border-radius:50%;background:#E2E6EF;color:#6B7488;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.sc-step.active{background:var(--sb-navy);color:#fff;}
.sc-step.active .n{background:rgba(255,255,255,.25);color:#fff;}
/* host entry surface (Rügen) — distinct from numbered SDK screens */
.sc-step.host{color:#7A5A2E;}
.sc-step.host .hn{display:flex;align-items:center;justify-content:center;width:16px;height:16px;color:var(--ru-orange);}
.sc-step.host .hn svg{width:12px;height:12px;}
.sc-step.host.active{background:var(--ru-orange);color:#fff;}
.sc-step.host.active .hn{color:#fff;}
.sc-div{width:1px;height:16px;background:#D7DAE2;flex:0 0 auto;margin:0 3px;align-self:center;}
.sc-hint{text-align:center;font-size:10px;color:#8A8478;margin-top:4px;}

/* gentle screen swap (transform only — no opacity, keeps content always painted) */
.fade-in{animation:slidein .26s ease;}
@keyframes slidein{from{transform:translateY(7px)}to{transform:none}}
</style>
</head>
<body>
<div class="stage">
  <div class="scaler" id="scaler">
    <div class="device" id="device">
      <div class="island"></div>
      <div class="screen" id="screen">
        <div class="statusbar">
          <div class="sb-time">9:41</div>
          <div class="sb-right">
            <div class="sig"><i></i><i></i><i></i><i></i></div>
            <svg class="wifi" viewBox="0 0 16 12" fill="currentColor"><path d="M8 11.2 9.8 9c-.5-.6-1.1-.9-1.8-.9s-1.3.3-1.8.9L8 11.2Zm0-7c1.8 0 3.4.7 4.6 1.9l1.3-1.4C12.4 3.1 10.3 2.2 8 2.2s-4.4.9-5.9 2.5L3.4 6.1C4.6 4.9 6.2 4.2 8 4.2Zm0-3.6c2.6 0 5 1 6.8 2.8L16 1.9C13.9-.2 11.1-1 8-1S2.1-.2 0 1.9l1.2 1.5C3 1.6 5.4.6 8 .6Z" transform="translate(0 1)"/></svg>
            <div class="batt"><i></i></div>
          </div>
        </div>
        <div class="viewport" id="viewport"></div>
        <div class="tabbar" id="tabbar"></div>
        <div class="homebar"></div>
      </div>
    </div>
  </div>

  <div class="showcase" id="showcase"></div>
  <div class="sc-hint">Demo shortcuts · the Rügen app navigation stays inside the phone</div>
</div>

<script>
/* ============================================================
   STATE
   ============================================================ */
var BEACHES = [
  {name:"Binz",   count:47, x:30, y:30},
  {name:"Sellin", count:31, x:62, y:46},
  {name:"Baabe",  count:18, x:46, y:62},
  {name:"Göhren", count:9,  x:74, y:70}
];
var ROW_DATA = {
  // row: array of chairs {n, state} state: avail|booked ; bt flag
  1:[{n:110,bt:1},{n:111},{n:112,s:'booked'},{n:113},{n:114,bt:1},{n:115}],
  2:[{n:116,s:'booked',bt:1},{n:117},{n:118,bt:1},{n:119,s:'booked'},{n:120,bt:1},{n:121}],
  3:[{n:122,bt:1},{n:123,s:'booked'},{n:124,bt:1},{n:125},{n:126,s:'booked',bt:1},{n:127}],
  4:[{n:128,bt:1},{n:129},{n:130},{n:131},{n:132,s:'booked',bt:1},{n:133}]
};

var state = {
  screen:'home',          // host: home ; sdk screens below
  area:'Binz',
  selChair:null,          // {n,row}
  cart:null,              // {n,row,area}
  booking:null,           // active booking {n,row,area,date,unlocked}
  pay:'apple',
  unlockPhase:'idle',     // idle|connecting|done
  scanPhase:'idle'        // idle|scanning|done
};

var SDK_STEPS = [
  {id:'map',     label:'Map'},
  {id:'row',     label:'Row'},
  {id:'cart',    label:'Cart'},
  {id:'pay',     label:'Pay'},
  {id:'confirm', label:'Confirm'},
  {id:'scan',    label:'QR Import'},
  {id:'bookings',label:'Bookings'},
  {id:'unlock',  label:'Unlock'}
];
var SDK_SET = {map:1,row:1,cart:1,pay:1,confirm:1,scan:1,bookings:1,unlock:1};

/* ============================================================
   ICONS
   ============================================================ */
var IC = {
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
  scan:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/></svg>',
  info:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 11v6M12 7.5v.01"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>',
  bt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7l10 10-5 4V3l5 4L7 17"/></svg>',
  btmini:'<svg viewBox="0 0 12 16" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4l6 6-3 2.5V2l3 2.5L3 10"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l5 5 9-11"/></svg>',
  checkmini:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l5 5 9-11"/></svg>',
  cal2:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>',
  refresh:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11A8 8 0 1 0 18 16M20 5v6h-6"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7M6 9.5V20h12V9.5M10 20v-5h4v5"/></svg>'
};

/* host tab icons */
var TAB_IC = {
  suche:'<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" stroke-width="2"/><path d="M21 21l-4-4" stroke-width="2" stroke-linecap="round"/><path d="M11 8v3l2 2" stroke-width="1.6" stroke-linecap="round"/></svg>',
  events:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2" stroke-width="2"/><path d="M3 9h18M8 3v4M16 3v4" stroke-width="2" stroke-linecap="round"/><rect x="7" y="12" width="2.5" height="2.5" fill="currentColor" stroke="none"/><rect x="11" y="12" width="2.5" height="2.5" fill="currentColor" stroke="none"/><rect x="15" y="12" width="2.5" height="2.5" fill="currentColor" stroke="none"/></svg>',
  buchen:'<svg viewBox="0 0 24 24"><path d="M3 18v-5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v5" stroke-width="2" stroke-linecap="round"/><path d="M5 11V8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3M3 18h18M5 18v2M19 18v2" stroke-width="2" stroke-linecap="round"/></svg>'
};

/* ============================================================
   HELPERS
   ============================================================ */
function $(id){return document.getElementById(id);}
function isSDK(s){return !!SDK_SET[s||state.screen];}
function chairLabel(){
  if(state.booking) return '#'+state.booking.n;
  if(state.cart) return '#'+state.cart.n;
  if(state.selChair) return '#'+state.selChair.n;
  return '#122';
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  var vp=$('viewport');
  vp.className='viewport';
  var html='';
  var dark=false;

  if(state.screen==='home'){ html=viewHome(); }
  else if(state.screen==='map'){ html=viewMap(); }
  else if(state.screen==='row'){ html=viewRow(); }
  else if(state.screen==='cart'){ html=viewCart(); }
  else if(state.screen==='pay'){ html=viewPay(); }
  else if(state.screen==='confirm'){ html=viewConfirm(); }
  else if(state.screen==='scan'){ html=viewScan(); }
  else if(state.screen==='bookings'){ html=viewBookings(); }
  else if(state.screen==='unlock'){ html=viewUnlock(); }

  vp.innerHTML='<div class="fade-in" style="min-height:100%;display:flex;flex-direction:column">'+html+'</div>';
  $('screen').className='screen'+(dark?' is-dark':'');

  renderTabbar();
  renderShowcase();
  if(state.screen==='row') wireRow();
  if(state.screen==='unlock') wireUnlock();
  if(state.screen==='scan') wireScan();
}

/* ---------- HOST: HOME ---------- */
function tile(label,grad,cls){
  return '<div class="tile '+(cls||'')+'"><div class="frame"><span class="label">'+label+'</span>'+
    '<div class="photo" style="background:'+grad+'"></div></div></div>';
}
function viewHome(){
  var g={
    insel:'linear-gradient(150deg,#cfe6f2,#9ec3d8 60%,#7fae8e)',
    sehens:'linear-gradient(160deg,#dfe7ee,#a9bccd 70%,#7f93a6)',
    orte:'linear-gradient(150deg,#e6e1d8,#c4b9a6)',
    natur:'linear-gradient(160deg,#7fae3e,#4f7d2a)',
    gastro:'linear-gradient(150deg,#3a3a40,#d98a2b)',
    aktiv:'linear-gradient(160deg,#bfd8e8,#e7d9b4)',
    strand:'linear-gradient(160deg,#aecfe0 0 46%,#e9d6a0 46%)',
    nacht:'linear-gradient(150deg,#e9ecef,#b9c2cb)'
  };
  var h='';
  h+='<div class="ru-header"><h1>INSEL RÜGEN</h1><span class="h-act" onclick="go(\'home\')">'+IC.refresh+'</span></div>';
  h+='<div class="ru-promo"><div class="pk">WHAT TO DO ON</div><div class="pt">Rügen in summer?</div><div class="pu">WWW.INSELZEITUNG.DE</div></div>';
  h+='<div class="grid">';
  h+=tile('THE ISLAND',g.insel,'');
  h+=tile('SIGHTS',g.sehens,'');
  // Beach Chairs SDK entry tile (new)
  h+='<div class="tile sb-tile" onclick="enterSDK()"><div class="frame"><span class="label">BEACH CHAIRS</span>'+
     '<div class="photo"><span class="sb-badge"><span class="dot"></span>Strandbutler</span>'+
     '<div class="mini-chair"></div><div class="mini-chair alt" style="height:30px"></div></div></div></div>';
  h+=tile('NATURE',g.natur,'');
  h+=tile('GASTRO',g.gastro,'');
  h+=tile('ACTIVE',g.aktiv,'');
  h+=tile('BEACH',g.strand,'wide');
  h+=tile('PLACES',g.orte,'');
  h+=tile('STAY',g.nacht,'');
  h+='</div>';
  return h;
}

/* ---------- SDK seam ---------- */
function seam(){
  return '<div class="seam"><div class="brand"><span class="case"></span>Powered by Strandbutler</div>'+
    '<div class="back" onclick="exitSDK()">'+IC.back+' Back to Rügen app</div></div>';
}
function sdkHead(title,opts){
  opts=opts||{};
  var left = opts.back? '<span class="hb" onclick="'+opts.back+'">'+IC.back+'</span>':'';
  var right='';
  if(opts.right==='scan') right='<span class="hr" onclick="go(\'scan\')">'+IC.scan+'</span>';
  if(opts.right==='info') right='<span class="hr info">'+IC.info+'</span>';
  return '<div class="sdk-head">'+left+'<h2>'+title+'</h2>'+right+'</div>';
}

/* ---------- SDK: MAP ---------- */
function viewMap(){
  var h=seam();
  h+='<div class="sdk" style="background:#EEF1F6">';
  h+='<div class="sdk-head" style="padding:14px 16px;justify-content:flex-start;border-bottom:0"><h2 style="font-size:18px">Book a beach chair</h2></div>';
  h+='<div class="map-top"><div class="mt-row">'+
       '<div class="date-field"><span>11.08.2026</span>'+IC.cal+'</div>'+
       '<div class="date-field"><span>11.08.2026</span>'+IC.cal+'</div>'+
       '<div class="date-go">'+IC.search+'</div></div></div>';
  // map canvas
  h+='<div class="map-canvas">';
  h+='<div class="wave" style="top:6px"></div><div class="wave" style="bottom:8px"></div>';
  // land masses (abstract Rügen-ish)
  h+='<div class="land" style="left:8%;top:14%;width:64%;height:40%;border-radius:48% 40% 38% 52%;transform:rotate(-6deg)"></div>';
  h+='<div class="land" style="left:40%;top:42%;width:50%;height:38%;border-radius:46% 52% 44% 40%;transform:rotate(8deg)"></div>';
  h+='<div class="seg" style="left:22%;top:30%;width:30%;height:3px;transform:rotate(18deg)"></div>';
  h+='<div class="seg" style="left:30%;top:36%;width:26%;height:3px;transform:rotate(-12deg)"></div>';
  h+='<div class="grn" style="left:14%;top:20%;width:60px;height:36px"></div>';
  h+='<div class="grn" style="left:58%;top:50%;width:70px;height:40px"></div>';
  h+='<div class="lbl" style="left:18%;top:24%">Rügen</div>';
  h+='<div class="lbl" style="left:60%;top:64%">Mönchgut</div>';
  BEACHES.forEach(function(b){
    var sel=(b.name===state.area)?' sel':'';
    h+='<div class="pin'+sel+'" style="left:'+b.x+'%;top:'+b.y+'%" onclick="pickArea(\''+b.name+'\')">'+
       '<div class="body"><span class="ic"></span></div><span class="count">'+b.count+'</span></div>';
  });
  // availability card
  var total=BEACHES.reduce(function(a,b){return a+b.count;},0);
  h+='<div class="avail-card"><div class="av-l"><span class="av-chair"></span>'+
     '<div><div class="big">'+total+' available</div><div class="sub">4 beach areas · '+state.area+', Rügen</div></div></div>'+
     '<button class="btn sm" onclick="go(\'row\')">Pick a row</button></div>';
  h+='</div></div>';
  return h;
}

/* ---------- SDK: ROW SELECTION ---------- */
function viewRow(){
  var h=seam();
  h+='<div class="sdk">';
  h+=sdkHead('Pick a beach chair',{back:"go('map')",right:'info'});
  h+='<div class="sdk-body">';
  h+='<div class="rows">';
  [1,2,3,4].forEach(function(r){
    h+='<div class="rgrp"><div class="rlabel">Row '+r+'</div><div class="rgrid">';
    ROW_DATA[r].forEach(function(c){
      if(c.s==='booked'){
        h+='<div class="chair booked">'+(c.bt?'<span class="bt" style="opacity:.5">'+IC.btmini+'</span>':'')+c.n+'</div>';
      }else{
        var sel=(state.selChair&&state.selChair.n===c.n)?' sel':'';
        h+='<div class="chair'+sel+'" data-n="'+c.n+'" data-row="'+r+'">'+(c.bt?'<span class="bt">'+IC.btmini+'</span>':'')+c.n+'</div>';
      }
    });
    h+='</div></div>';
  });
  h+='</div>';
  h+='<div class="legend"><span class="lg"><span class="sw av"></span>Available</span>'+
     '<span class="lg"><span class="sw bk"></span>Booked</span>'+
     '<span class="lg" style="color:var(--sb-navy)">'+IC.bt.replace('width="17"','')+'Bluetooth</span></div>';
  // select bar
  if(state.selChair){
    h+='<div class="select-bar"><div class="sinfo"><div class="sinfo-t">Beach Chair #'+state.selChair.n+'</div>'+
       '<div class="sinfo-s">'+state.area+' Beach · Row '+state.selChair.row+'</div></div>'+
       '<button class="btn sm" onclick="addToCart()">Add chair</button></div>';
  }
  h+='</div></div>';
  return h;
}
function wireRow(){
  var vp=$('viewport');
  vp.querySelectorAll('.chair[data-n]').forEach(function(el){
    el.addEventListener('click',function(){
      state.selChair={n:parseInt(el.dataset.n),row:parseInt(el.dataset.row)};
      render();
    });
  });
}

/* ---------- SDK: PAYMENT ---------- */
function payOpt(id,ic,name,bg,color){

    '<span class="pay-ic" style="background:'+bg+';color:'+color+'">'+ic+'</span>'+
    '<span class="pay-name">'+name+'</span><span class="radio"></span></div>';
}
function viewPay(){
  var h=seam();
  h+='<div class="sdk">';
  h+=sdkHead('Payment',{back:"go('cart')"});
  h+='<div class="sdk-body pad">';
  h+='<div class="section-k">PAYMENT METHOD</div>';
  h+='<div class="pay-list">';
  h+=payOpt('apple','','Apple Pay','#000','#fff');
  h+=payOpt('google','G','Google Pay','#fff','#4285F4');
  h+=payOpt('card','','Credit card','#E9ECF3','#1b2a4a');
  h+=payOpt('paypal','P','PayPal','#EAF1FB','#0B3D8C');
  h+='</div>';
  h+='<div class="section-k" style="margin-top:20px">BILLING DETAILS</div>';
  h+='<div class="bill"><div class="bf"><div class="bl">Name</div><div class="bv">Anna Müller</div></div>'+
     '<div class="bf"><div class="bl">Email</div><div class="bv">anna@example.com</div></div></div>';
  h+='<div style="height:18px"></div>';
  h+='<button class="btn" onclick="payNow()">Pay now · 12,50 €</button>';
  h+='</div></div>';
  return h;
}

/* ---------- SDK: CONFIRMATION (DIRECT_BOOKING) ---------- */
function viewConfirm(){

  h+='<div class="sdk-head" style="border-bottom:0"><h2>Payment successful</h2></div>';

     '<div class="active-pill"><span class="d"></span>Booking active · no activation needed</div></div>';

     '<span class="v">anna@example.com</span></div><div class="divider" style="margin:6px 0 12px"></div>'+
     '<div style="font-size:15px;font-weight:800;color:var(--sb-navy)">Beach Chair #'+c.n+'</div>'+
     '<div style="font-size:13px;color:var(--sb-muted);margin-top:3px">'+state.area+' Beach, Row '+c.row+' · 09:00–18:00 · 11.08.2026</div></div>';

  h+='<button class="btn" onclick="go(\'bookings\')">Go to My Bookings</button>';

  h+='</div></div></div>';

/* ---------- SDK: QR IMPORT (accessible via showcase strip only) ---------- */
function viewScan(){
  var b=state.booking||state.cart||{n:122,row:3};
  var phase=state.scanPhase;
  var h=seam();
  h+='<div class="scan">';
  h+='<div class="uhead"><span class="ub" onclick="go(\'confirm\')">'+IC.back+'</span><h2>Import booking</h2></div>';
  h+='<div class="usub">'+(phase==='done'?'Booking found':'Point the camera at your QR code')+'</div>';
  h+='<div class="scan-wrap"><div class="qr-frame'+(phase==='done'?' ok':'')+'">';
  if(phase==='done'){
    h+='<div class="qr-check">'+IC.check+'</div>';
  }else{
    h+='<span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>';
    h+='<div class="qr-dots">'+qrDots()+'</div>';
    h+='<div class="scanline"></div>';
  }
  h+='</div></div>';
  if(phase==='done'){
    h+='<div class="scan-result"><div class="sr-t">Booking imported</div>'+
       '<div class="sr-s">Beach Chair #'+b.n+' · '+state.area+' Beach, Row '+b.row+' (Rügen)</div></div>';
    h+='<div style="padding:0 22px 8px"><button class="btn ghost" style="background:#fff" onclick="afterImport()">'+IC.bt+' Unlock chair</button></div>';
  }else{
    h+='<div class="scan-status">'+(phase==='scanning'?'Scanning…':'Hold steady')+'</div>';
  }
  h+='</div>';
  return h;
}
function qrDots(){
  var s='';
  for(var i=0;i<49;i++){ s+='<span'+(Math.random()>.45?' class="on"':'')+'></span>'; }
  return s;
}
function wireScan(){
  if(state.scanPhase==='idle'){
    state.scanPhase='scanning'; 
    var node=$('viewport').querySelector('.scan-status'); if(node) node.textContent='Scanning…';
    setTimeout(function(){
      if(state.screen!=='scan'){ return; }
      state.scanPhase='done';
      // QR import activates booking management state
      var c=state.booking||state.cart||{n:122,row:3,area:state.area};
      if(!state.booking) state.booking={n:c.n,row:c.row,area:state.area,unlocked:false};
      render();
    },1600);
  }
}
function afterImport(){ go('unlock'); }

/* ---------- SDK: MY BOOKINGS ---------- */
function viewBookings(){
  var h=seam();
  h+='<div class="sdk">';
  h+=sdkHead('My Bookings',{back:"go('map')",right:'scan'});
  h+='<div class="sdk-body pad">';
  if(!state.booking){
    h+='<div class="empty"><div class="ec"><span class="cc"></span></div>'+
       '<h3>No active bookings</h3><p>Browse beach chairs to start a new booking.</p>'+
       '<button class="btn" onclick="go(\'map\')">Browse beach chairs</button></div>';
  }else{
    var b=state.booking, un=b.unlocked;
    h+='<div class="book-card'+(un?'':' locked')+'">';
    h+='<div class="bk-top"><div class="bk-thumb'+(un?'':' lk')+'"><span class="cc"></span>'+
       '<span class="badge">'+IC.checkmini+'</span></div>';
    h+='<div class="bk-info"><div class="bk-h"><span class="bk-title">Beach Chair #'+b.n+'</span>'+
       '<span class="bk-stat '+(un?'un':'lk')+'">'+(un?'UNLOCKED':'LOCKED')+'</span></div>';
    h+='<div class="bk-loc">'+b.area+' Beach, Row '+b.row+' (Rügen)</div>';
    h+='<div class="bk-meta"><span class="m">'+IC.cal2+' 11.08.2026</span><span class="m bt">'+IC.bt.replace('stroke-width="2.2"','stroke-width="2.6"')+' BT</span></div></div></div>';
    h+='<div class="bk-actions"><button class="btn gray sm" onclick="removeBooking()">Remove</button>'+
       '<button class="btn '+(un?'ghost':'')+' sm" onclick="'+(un?'lockChair()':"go('unlock')")+'">'+IC.bt+' '+(un?'Lock':'Unlock')+'</button></div>';
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

/* ---------- SDK: BLUETOOTH UNLOCK ---------- */
function viewUnlock(){
  var b=state.booking||{n:122};
  var phase=state.unlockPhase;
  var h=seam();
  h+='<div class="unlock'+(phase==='connecting'?' connecting':'')+'" id="unlockScreen">';
  h+='<div class="uhead"><span class="ub" onclick="go(\'bookings\')">'+IC.back+'</span><h2>Unlock chair</h2></div>';

  else h+='<div style="height:22px"></div>';

}
function wireUnlock(){/* handled via doUnlock */}

  tb.innerHTML=
    '<div class="tab '+(active==='start'?'active':'')+'" onclick="go(\'home\')"><div class="logo-r">RÜGEN</div><span>Start</span></div>'+

    '<div class="tab" onclick="go(\'home\')"><div class="t-ic">'+TAB_IC.events+'</div><span>Events</span></div>'+
    '<div class="tab" onclick="go(\'home\')"><div class="t-ic">'+TAB_IC.buchen+'</div><span>Stay</span></div>'+
    '<div class="tab" onclick="go(\'home\')"><div class="logo-z">INSEL<br>ZEITUNG</div><span>News</span></div>';
}

/* ---------- SHOWCASE STRIP ---------- */
function renderShowcase(){
  var sc=$('showcase');
  var html='';
  // host entry surface (Rügen home) — not an SDK screen
  html+='<div class="sc-step host'+(state.screen==='home'?' active':'')+'" onclick="go(\'home\')"><span class="hn">'+IC.home+'</span>Home</div>';
  html+='<span class="sc-div"></span>';
  SDK_STEPS.forEach(function(st,i){
    var act=(state.screen===st.id)?' active':'';
    html+='<div class="sc-step'+act+'" onclick="jump(\''+st.id+'\')"><span class="n">'+(i+1)+'</span>'+st.label+'</div>';
  });
  sc.innerHTML=html;
  // keep active step visible without scrollIntoView
  var act=sc.querySelector('.sc-step.active');
  if(act){ sc.scrollLeft = Math.max(0, act.offsetLeft - (sc.clientWidth/2) + (act.offsetWidth/2)); }
}

/* ============================================================
   ACTIONS
   ============================================================ */
function go(s){ if(s==='unlock') state.unlockPhase='idle'; if(s==='scan') state.scanPhase='idle'; state.screen=s; render(); }
function enterSDK(){ state.screen='map'; render(); }
function exitSDK(){ state.screen='home'; render(); }
function pickArea(name){ state.area=name; var b=BEACHES.filter(function(x){return x.name===name;})[0]; render(); }
function addToCart(){ if(!state.selChair) return; state.cart={n:state.selChair.n,row:state.selChair.row,area:state.area}; go('cart'); }
function emptyCart(){ state.cart=null; state.selChair=null; go('map'); }
function setPay(id){ state.pay=id; render(); }
function payNow(){
  var c=state.cart||{n:122,row:3};
  state.booking={n:c.n,row:c.row,area:state.area,unlocked:false};
  go('confirm');
}
function removeBooking(){ state.booking=null; state.cart=null; state.selChair=null; render(); }
function lockChair(){ if(state.booking) state.booking.unlocked=false; render(); }
function doUnlock(){
  if(state.unlockPhase!=='idle') return;
  state.unlockPhase='connecting'; render();
  setTimeout(function(){
    state.unlockPhase='done';
    if(state.booking) state.booking.unlocked=true;
    render();
    setTimeout(function(){ if(state.screen==='unlock'){ state.unlockPhase='idle'; go('bookings'); } },1100);
  },1600);
}

/* showcase jump — seed believable state for direct demo access */
function jump(s){
  if(s==='cart' && !state.cart){ state.selChair={n:122,row:3}; state.cart={n:122,row:3,area:state.area}; }
  if(s==='pay' && !state.cart){ state.cart={n:122,row:3,area:state.area}; }
  if((s==='confirm'||s==='bookings'||s==='unlock') && !state.booking){
    state.booking={n:122,row:3,area:state.area,unlocked:false};
    if(!state.cart) state.cart={n:122,row:3,area:state.area};
  }
  if(s==='row' && !state.selChair){ /* leave unselected */ }
  go(s);
}

/* ============================================================
   SCALING
   ============================================================ */
function fit(){
  var dev=$('device');
  var vh=window.innerHeight, vw=window.innerWidth;
  var availH=vh-80;            /* minimal room for compact showcase strip */
  var availW=vw-28;
  var scale=Math.min(1, availH/874, availW/428);
  scale=Math.max(scale,.4);
  dev.style.transform='scale('+scale+')';
  var sc=$('scaler');
  sc.style.width=(428*scale)+'px';
  sc.style.height=(874*scale)+'px';
}
window.addEventListener('resize',fit);

render();
fit();
</script>
